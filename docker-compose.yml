services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER} -d ${DB_NAME}']
      interval: 3s
      retries: 10
    networks:
      - edge

  seed:
    build: .
    env_file: .env
    environment:
      DB_HOST: postgres
      DATA_DIR: /data
    volumes:
      - ./data:/data:ro
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - seed
    networks:
      - edge

volumes:
  pg_data:

networks:
  edge:
    external: true

services:
  postgres:
    image: postgres:16
    env_file: .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 3s
      retries: 10

  mongo:
    image: mongo:7
    ports:
      - "${MONGO_PORT}:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand('ping').ok"]
      interval: 3s
      retries: 10

  seed:
    build: .
    env_file: .env
    environment:
      DB_HOST: postgres
      MONGO_HOST: mongo
    volumes:
      - ./data:/data:ro
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
    profiles:
      - seed

volumes:
  pg_data:
  mongo_data:

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: etl_user
      POSTGRES_PASSWORD: etl_pass
      POSTGRES_DB: etl_demo
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U etl_user -d etl_demo"]
      interval: 3s
      retries: 10

  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand('ping').ok"]
      interval: 3s
      retries: 10

  seed:
    build: .
    environment:
      CSV_PATH: data/customers.csv
      SQL_URI: postgresql://etl_user:etl_pass@postgres:5432/etl_demo
      SQL_TABLE: customers
      MONGO_URI: mongodb://mongo:27017/
      MONGO_DB: etl_demo
      MONGO_COLLECTION: customers
    volumes:
      - ./data:/app/data:ro
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
    profiles:
      - seed

volumes:
  pg_data:
  mongo_data:
